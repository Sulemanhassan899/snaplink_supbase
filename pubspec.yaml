name: snaplink
description: "image_uploader"

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  bottom_picker:
  country_code_picker:
  dropdown_button2:
  gradient_borders:
  flutter_slidable:
  gap: ^3.0.1
  flutter_staggered_grid_view:
  table_calendar:
  syncfusion_flutter_sliders:
  svg_flutter:
  google_fonts:
  get:
  simple_gradient_text:
  weekly_date_picker:
  cached_network_image:
  intl:
  persistent_bottom_nav_bar:
  carousel_slider:
  pinput:
  bottom_navy_bar:
  stylish_bottom_bar:
  cupertino_icons:
  flutter_animate:
  shared_preferences:
  bounce: ^1.0.2
  intro_screen_onboarding_flutter: ^1.0.0
  smooth_page_indicator:
  syncfusion_flutter_charts: ^28.1.4
  fl_chart:
  draggable_home:
  flutter_advanced_drawer: ^1.4.0
  tap_to_expand: ^0.7.2
  persistent_bottom_nav_bar_v2:
  dotted_border:
  flutter_spinkit: ^5.2.0
  neon: ^0.1.0
  supabase_flutter: ^2.8.4
  google_sign_in: ^6.3.0
  app_links:



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/laucnher_icon_2.png"
  min_sdk_android: 21


  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/



  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-ExtraLight.ttf
          weight: 300
        - asset: assets/fonts/Nunito-Light.ttf
          weight: 300
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Nunito-Black.ttf
          weight: 900


flutter_assets:
  assets_path: assets/
  output_path: lib/generated/
  filename: assets.dart
  field_prefix: ""