name: snaplink
description: "image_uploader"

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter


  gap: ^3.0.1
  svg_flutter:
  google_fonts:
  get:
  simple_gradient_text:
  cached_network_image:
  intl:
  carousel_slider:
  cupertino_icons:
  flutter_animate:
  shared_preferences:
  bounce: ^1.0.2
  smooth_page_indicator:
  fl_chart:
  draggable_home:
  supabase_flutter: ^2.8.4
  google_sign_in: ^6.3.0
  app_links:
  flutter_local_notifications: ^19.1.0
  permission_handler: ^11.0.1





dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0


flutter_launcher_icons: ^0.14.3

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/laucnher_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/animations/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-ExtraLight.ttf
          weight: 300
        - asset: assets/fonts/Nunito-Light.ttf
          weight: 300
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Nunito-Black.ttf
          weight: 900



flutter_assets:
  assets_path: assets/
  output_path: lib/generated/
  filename: assets.dart
  field_prefix: ""